[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.embed_txtfiles = web/index.html
upload_port = /dev/cu.usbserial-210
monitor_port = /dev/cu.usbserial-210
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
build_flags =
    ; --- ESP32-2432S028 (CYD) TFT_eSPI setup ---
    ; TFT on HSPI so the XPT2046 touch chip can own VSPI
    -DUSE_HSPI_PORT=1
    ; CYD has resistive touch; drop this flag on touchless boards
    -DFEATURE_TOUCH=1
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DTFT_RGB_ORDER=TFT_BGR
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_GFXFF
    -DSMOOTH_FONT
